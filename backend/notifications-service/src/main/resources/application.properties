spring.application.name=notifications-service
server.port=8085

# Persistencia DB Toggle
agendafacil.db.enabled=true

# Postgres datasource
spring.datasource.url=jdbc:postgresql://db:5432/agendafacil
spring.datasource.username=postgres
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# Hikari pool tuning
spring.datasource.hikari.maximum-pool-size=10

# Notificaciones
agendafacil.notifications.provider=LOG

# -------------------------------------------------------
# SMTP – Correo Real
# Para activar, cambia provider a SMTP y rellena los valores.
# Compatible con Gmail, SendGrid, Resend, AWS SES, etc.
# -------------------------------------------------------
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:noreply@agendafacil.cl}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
agendafacil.notifications.from=${SMTP_FROM:noreply@agendafacil.cl}
