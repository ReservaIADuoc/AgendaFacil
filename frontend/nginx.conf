# ubicación: frontend/nginx.conf

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # react router usa rutas del lado del cliente, por eso cualquier ruta
    # que no sea un archivo real cae en index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # si en el futuro el frontend llama a /api/..., nginx lo manda al gateway
    # en vez de buscar ese archivo entre los estáticos.
    location /api/ {
        proxy_pass http://gateway-api:8080/api/;
    }
}
